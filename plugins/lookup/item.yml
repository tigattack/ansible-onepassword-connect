---
DOCUMENTATION:
  name: item
  author: tigattack (@tigattack)
  version_added: "1.0.0"
  short_description: Retrieve secrets from a self-hosted 1Password Connect Server.
  description:
    - Retrieves secrets from a 1Password Connect Server.
    - Supports C(op://) secret reference URIs directly as positional
      terms.
    - Alternatively accepts O(vault), O(item), and O(field) as named
      parameters to construct the reference automatically.
    - Three positional strings are interpreted as V(vault), V(item),
      V(field) when none starts with C(op://).
  requirements:
    - onepasswordconnectsdk >= 2.0.0
  seealso:
    - plugin: community.general.onepassword
      plugin_type: lookup
      description: The 1Password CLI-based lookup plugin in C(community.general).
      link: https://docs.ansible.com/projects/ansible/latest/collections/community/general/onepassword_lookup.html
  options:
    _terms:
      description:
        - Either C(op://) URIs (e.g. C(op://vault/item/field)) or a positional triple of O(vault), O(item), O(field).
        - UUIDs are supported for vault, item, and field segments.
        - Mutually exclusive with O(vault) and O(item) named parameters.
      type: list
      elements: str
      required: false
    host:
      description:
        - URL of the 1Password Connect Server.
      type: str
      required: true
      env:
        - name: OP_CONNECT_HOST
    token:
      description:
        - API token for the 1Password Connect Server.
      type: str
      required: true
      no_log: true
      env:
        - name: OP_CONNECT_TOKEN
    vault:
      description:
        - Vault name or ID.
        - Required when using named parameter mode. Mutually exclusive with positional C(_terms).
      type: str
      required: false
    item:
      description:
        - Item name or UUID.
        - Required when using named parameter mode. Mutually exclusive with positional C(_terms).
      type: str
      required: false
    field:
      description:
        - Field label to retrieve.
        - Use V(*) to return B(all) fields as a dictionary. Equivalent to C(op://vault/item/*).
        - When omitted, the first matching default field (C(password) then C(credential)) is returned.
      type: str
      required: false
    section:
      description:
        - Section label or ID to scope the field lookup.
      type: str
      required: false
  notes:
    - Requires the C(onepasswordconnectsdk) Python package (C(pip install onepasswordconnectsdk>=2.0.0)).
    - When O(field) is C(*), the return value is a dictionary mapping field labels to values rather than a string.

EXAMPLES: |
  # ── op:// reference (single) ─────────────────────────────────────────
  - name: Fetch a database password
    ansible.builtin.debug:
      msg: "{{ lookup('item', 'op://Infrastructure/db-primary/password') }}"

  # ── op:// references (batch) ─────────────────────────────────────────
  - name: Fetch several secrets at once
    ansible.builtin.debug:
      msg: "{{ lookup('item', 'op://Infra/db/user', 'op://Infra/db/password') }}"

  # ── OP UUID lookup ────────────────────────────────────────────────────
  # UUID is also supported for the vault/item/field segments.
  - name: Get secret by UUID
    ansible.builtin.debug:
      msg: "{{ lookup('item', 'op://<vault UUID>/<item UUID>') }}"

  # ── Named parameters ─────────────────────────────────────────────────
  - name: Fetch by vault / item / field names
    ansible.builtin.debug:
      msg: >-
        {{ lookup('item',
                  vault='Infrastructure',
                  item='db-primary',
                  field='password') }}

  # ── Named parameters with section ────────────────────────────────────
  - name: Fetch from a specific section
    ansible.builtin.debug:
      msg: >-
        {{ lookup('item',
                  vault='Infrastructure',
                  item='db-primary',
                  section='connection',
                  field='password') }}

  # ── Sectioned field ───────────────────────────────────────────────────
  - name: Get API key from section via op:// URI
    ansible.builtin.debug:
      msg: "{{ lookup('item', 'op://Production/my-api/credentials/api_key') }}"

  # ── Positional shorthand (vault, item, field) ────────────────────────
  - name: Positional triple
    ansible.builtin.debug:
      msg: "{{ lookup('item', 'Infrastructure', 'db-primary', 'password') }}"

  # ── Loop with query ──────────────────────────────────────────────────
  - name: Iterate over secrets
    ansible.builtin.debug:
      msg: "secret={{ item }}"
    loop: "{{ query('item', 'op://Infra/db/user', 'op://Infra/db/password') }}"

  # ── Explicit host/token override ────────────────────────────────────
  - name: Target a different Connect Server
    ansible.builtin.debug:
      msg: >-
        {{ lookup('item', 'op://Infra/db/password',
                  host='https://connect.internal:8443',
                  token=connect_api_token) }}

  # ── All fields (wildcard) ──────────────────────────────────────────
  - name: Fetch all fields as a dict via op:// wildcard
    ansible.builtin.set_fact:
      db_creds: "{{ lookup('item', 'op://Infra/db-primary/*') }}"

  - name: Use individual fields from the dict
    ansible.builtin.debug:
      msg: "user={{ db_creds.username }} pass={{ db_creds.password }}"

  - name: Fetch all fields via named parameters
    ansible.builtin.set_fact:
      db_creds: "{{ lookup('item', vault='Infra', item='db-primary', field='*') }}"

  # ── All fields scoped to a section ─────────────────────────────────
  - name: Fetch all fields in a specific section
    ansible.builtin.set_fact:
      conn: "{{ lookup('item', 'op://Infra/db-primary/connection/*') }}"

RETURN:
  _raw:
    description:
      - The value(s) of the requested field(s).
      - For all modes except wildcard (C(field=*) or C(op://vault/item/*)), each element is a string.
      - When C(field=*), each element is a dictionary mapping field labels to their values (C(dict[str, str])).
    type: list
    elements: raw
